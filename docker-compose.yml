version: "3.8"

services:
  satellite-sim:
    build: .
    container_name: satellite_telemetry_sim
    ports:
      # Map port 8888 on the host to port 8888 in the container
      - "8888:8888"
    volumes:
      # Mount the entire project directory to the container
      # This allows live code changes and access to the notebook
      - .:/app
    # Command to start Jupyter Lab
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token='' --NotebookApp.password=''
